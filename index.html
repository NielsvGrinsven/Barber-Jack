<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserveer je knipbeurt</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0ede8;
      --muted: #888;
      --accent: #d4a85a;
      --accent-dim: rgba(212,168,90,0.12);
      --radius: 10px;
      --font: 'Georgia', serif;
      --mono: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header .shop-name {
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-style: italic;
    }

    header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.72rem;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font);
      transition: border-color 0.15s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 400px) { .row2 { grid-template-columns: 1fr; } }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
      gap: 8px;
      margin-top: 6px;
    }

    .slot {
      padding: 9px 4px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: var(--mono);
      color: var(--muted);
      transition: all 0.15s;
      user-select: none;
    }
    .slot:hover { border-color: var(--accent); color: var(--text); }
    .slot.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .slot.taken { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; pointer-events: none; }

    .hint { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); margin-top: 6px; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #111;
      font-size: 0.9rem;
      font-weight: bold;
      font-family: var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 1rem 0 0.5rem;
    }
    .success .checkmark {
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .success p { font-size: 0.9rem; line-height: 1.6; color: var(--muted); }
    .success strong { color: var(--text); }

    .reset-btn {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 9px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { color: var(--text); border-color: var(--muted); }

    .error-msg {
      font-size: 0.78rem;
      color: #e07070;
      font-family: var(--mono);
      margin-top: 8px;
      display: none;
    }

    .loading-slots {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      padding: 8px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="shop-name" id="shop-name">The Barbershop</div>
  <p>Online reserveren</p>
</header>

<div class="card">
  <div id="booking-form">
    <div class="row2">
      <div class="field">
        <label>Voornaam</label>
        <input type="text" id="fname" placeholder="Omar" autocomplete="given-name" />
      </div>
      <div class="field">
        <label>Achternaam</label>
        <input type="text" id="lname" placeholder="El Amrani" autocomplete="family-name" />
      </div>
    </div>
    <div class="field">
      <label>Telefoonnummer</label>
      <input type="tel" id="phone" placeholder="+31 6 12 34 56 78" autocomplete="tel" />
    </div>
    <div class="field">
      <label>Type knipbeurt</label>
      <select id="service">
        <option value="">— maak een keuze —</option>
        <option value="knippen">Knippen</option>
        <option value="baard">Baard trimmen + contouren</option>
        <option value="fade">Fade</option>
      </select>
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="bdate" />
    </div>
    <div class="field">
      <label>Tijdstip</label>
      <div id="slot-container">
        <div class="loading-slots">Kies eerst een datum</div>
      </div>
      <input type="hidden" id="chosen-slot" />
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitBooking()">Bevestig reservering</button>
  </div>

  <div class="success" id="success-box">
    <div class="checkmark">✓</div>
    <p id="success-text"></p>
    <button class="reset-btn" onclick="resetForm()">Nieuwe reservering maken</button>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  // Plak hieronder jouw Supabase URL en anon key (zie README)
  const SUPABASE_URL = 'https://pustkooxxjdmyoanieli.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1c3Rrb294eGpkbXlvYW5pZWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODY1MDQsImV4cCI6MjA5MTM2MjUwNH0.UlHiL5a8WUX7wVkd4_d2MN5tpk91nPxLXOsOVsCCsAo';
  const SHOP_NAME = 'Barber Jack'; // Naam van de kapper
  // ────────────────────────────────────────────────────────

  document.getElementById('shop-name').textContent = SHOP_NAME;
  document.title = SHOP_NAME + ' — Reserveren';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const today = new Date();
  today.setHours(0,0,0,0);
  const bdateEl = document.getElementById('bdate');
  bdateEl.min = toKey(today);
  bdateEl.value = toKey(today);
  bdateEl.addEventListener('change', loadSlots);
  loadSlots();

  function toKey(d) {
    return d.toISOString().slice(0,10);
  }

  async function loadSlots() {
    const dateKey = bdateEl.value;
    const container = document.getElementById('slot-container');
    document.getElementById('chosen-slot').value = '';

    if (!dateKey) {
      container.innerHTML = '<div class="loading-slots">Kies eerst een datum</div>';
      return;
    }

    container.innerHTML = '<div class="loading-slots">Laden...</div>';

    const [slotsRes, bookingsRes] = await Promise.all([
      sb.from('slots').select('time').eq('date', dateKey).order('time'),
      sb.from('bookings').select('time').eq('date', dateKey)
    ]);

    const openTimes = (slotsRes.data || []).map(s => s.time.slice(0,5));
    const takenTimes = (bookingsRes.data || []).map(b => b.time.slice(0,5));

    if (!openTimes.length) {
      container.innerHTML = '<div class="loading-slots">Geen beschikbare tijden op deze dag</div>';
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'slot-grid';
    openTimes.forEach(t => {
      const el = document.createElement('div');
      el.className = 'slot' + (takenTimes.includes(t) ? ' taken' : '');
      el.textContent = t;
      if (!takenTimes.includes(t)) {
        el.onclick = () => {
          document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
          el.classList.add('selected');
          document.getElementById('chosen-slot').value = t;
        };
      }
      grid.appendChild(el);
    });
    container.innerHTML = '';
    container.appendChild(grid);
  }

  async function submitBooking() {
    const fname   = document.getElementById('fname').value.trim();
    const lname   = document.getElementById('lname').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const service = document.getElementById('service').value;
    const dateKey = bdateEl.value;
    const slot    = document.getElementById('chosen-slot').value;
    const errEl   = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!fname || !lname || !phone || !service || !dateKey || !slot) {
      errEl.textContent = 'Vul alle velden in en kies een tijdstip.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Even geduld...';

    const { error } = await sb.from('bookings').insert([{
      date: dateKey,
      time: slot,
      first_name: fname,
      last_name: lname,
      phone,
      service
    }]);

    if (error) {
      if (error.code === '23505') {
        errEl.textContent = 'Dit tijdstip is net geboekt door iemand anders. Kies een ander tijdstip.';
      } else {
        errEl.textContent = 'Er ging iets mis. Probeer het opnieuw.';
      }
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Bevestig reservering';
      return;
    }

    const dateStr = new Date(dateKey + 'T12:00:00').toLocaleDateString('nl-NL', {
      weekday: 'long', day: 'numeric', month: 'long'
    });
    const serviceLabels = { knippen: 'Knippen', baard: 'Baard trimmen + contouren', fade: 'Fade' };

    document.getElementById('success-text').innerHTML =
      `<strong>${fname} ${lname}</strong>, je bent geboekt op<br>
       <strong>${dateStr}</strong> om <strong>${slot}</strong>.<br>
       Knipbeurt: <strong>${serviceLabels[service]}</strong><br><br>
       Tot dan! ✂`;

    document.getElementById('booking-form').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
  }

  function resetForm() {
    ['fname','lname','phone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('service').value = '';
    document.getElementById('chosen-slot').value = '';
    document.getElementById('booking-form').style.display = 'block';
    document.getElementById('success-box').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = 'Bevestig reservering';
    loadSlots();
  }
</script>
</body>
</html>
